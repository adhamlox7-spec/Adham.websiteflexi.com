<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght,GRAD@0,17..18,400..700,200;1,17..18,400..700,200&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Adham Media</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
    <header class="header">
        <img class="logo" src="images/20461.webp" alt="Adham Media logo" />
        <nav class="header-links">
            <a href="index.html">Home</a>
            <a href="#">Our shop</a>
            <a href="#">Contact</a>
            <a class="btn-secondary" href="register.html">Register</a>
            <button type="button" onclick="location.href='register.html'">Sign in</button>
        </nav>
    </header>

    <main class="hero-section gaming-hero">
        <div class="hero-copy">
            <span>Adham Gaming Arena</span>
            <h1>Level Up Your Gaming Experience</h1>
            <p>انضم إلى تجربة ألعاب احترافية مع تصميم متطور، عروض أحداث، وبطاقات لاعب جرافيكية عالية الجودة.</p>
            <div class="hero-actions">
                <a class="hero-cta" href="register.html">Join the Squad</a>
                <button type="button" onclick="location.href='register.html'">Start Playing</button>
            </div>
            <div class="game-stats">
                <div>
                    <strong>99%</strong>
                    <p>Uptime</p>
                </div>
                <div>
                    <strong>120+</strong>
                    <p>Events</p>
                </div>
                <div>
                    <strong>24/7</strong>
                    <p>Live Support</p>
                </div>
            </div>
        </div>
        <div class="hero-image gaming-card">
            <img src="images/banner-image.jpg" alt="Gaming arena banner">
            <div class="card-overlay">
                <div>
                    <strong>Pro League</strong>
                    <p>Ready to join the next tournament?</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
