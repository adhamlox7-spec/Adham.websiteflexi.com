<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght,GRAD@0,17..18,400..700,200;1,17..18,400..700,200&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Register | Adham Media</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        body { margin: 0; font-family: "Roboto", sans-serif; background: linear-gradient(180deg, #0d1f48 0%, #07152d 100%); color: #ffffff; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; }
        .header-links { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .header-links a, .header-links .btn-secondary { color: white; text-decoration: none; padding: 10px 16px; border-radius: 12px; background: rgba(255,255,255,0.08); }
        .register-panel { display: grid; grid-template-columns: 1fr 1.05fr; gap: 0; max-width: 1080px; margin: 40px auto; background: rgba(255,255,255,0.06); border-radius: 32px; overflow: hidden; }
        .register-info, .register-form { padding: 40px; }
        .register-info span { color: #7dd3fc; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
        .register-info h1 { margin: 0 0 16px; font-size: 2.2rem; line-height: 1.1; }
        .register-info p, .register-stats p, .helper-text { color: rgba(255,255,255,0.84); }
        .register-stats { display: flex; gap: 16px; flex-wrap: wrap; }
        .register-stats div { background: rgba(255,255,255,0.08); padding: 18px 20px; border-radius: 20px; min-width: 140px; }
        .register-stats strong { display: block; font-size: 1.8rem; margin-bottom: 8px; }
        .input-group { display: grid; gap: 8px; }
        .input-group input { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.08); color: white; }
        .btn-primary { width: 100%; padding: 16px; border: none; border-radius: 16px; background: linear-gradient(135deg, #40b3ff, #ff7b70); color: white; font-weight: 700; cursor: pointer; }
        .success-message { display: none; margin: 0; padding: 14px 18px; border-radius: 14px; background: rgba(34,197,94,0.15); color: #d1fae5; border: 1px solid rgba(34,197,94,0.3); }
        .success-message.visible { display: block; }
        @media (max-width: 950px) { .register-panel { grid-template-columns: 1fr; } .register-info { border-bottom: 1px solid rgba(255,255,255,0.08); } }
    </style>
</head>
<body class="register-page">
    <header class="header">
        <img class="logo" src="images/20461.webp" alt="Adham Media logo" />
        <nav class="header-links">
            <a href="index.html">Home</a>
            <a href="#">Our shop</a>
            <a href="#">Contact</a>
            <a class="btn-secondary" href="register.html">Register</a>
        </nav>
    </header>

    <main class="form-container">
        <section class="register-panel">
            <div class="register-info">
                <span>ابدأ الآن</span>
                <h1>انشئ حسابك في Adham Media</h1>
                <p>هذه صفحة تسجيل تجريبية تعرض نموذج احترافي دون اتصال فعلي بقاعدة بيانات. يمكنك استخدامها للتصميم فقط.</p>
                <div class="register-stats">
                    <div>
                        <strong>120+</strong>
                        <p>عملاء راضون</p>
                    </div>
                    <div>
                        <strong>45</strong>
                        <p>خدمة جاهزة</p>
                    </div>
                </div>
            </div>

            <form class="register-form" onsubmit="event.preventDefault(); document.getElementById('successMessage').classList.add('visible');">
                <div class="input-group">
                    <label for="fullname">الاسم بالكامل</label>
                    <input id="fullname" type="text" placeholder="أدخل اسمك" required>
                </div>
                <div class="input-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input id="email" type="email" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input id="password" type="password" placeholder="أدخل كلمة مرور قوية" required>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">تأكيد كلمة المرور</label>
                    <input id="confirmPassword" type="password" placeholder="أعد كتابة كلمة المرور" required>
                </div>
                <button class="btn-primary" type="submit">إنشاء حساب</button>
                <p class="helper-text">لا يتم إنشاء حساب بالفعل. هذا نموذج عرضي فقط.</p>
                <p id="successMessage" class="success-message">تم إرسال البيانات بنجاح! هذا مثال عرض فقط.</p>
            </form>
        </section>
    </main>
</body>
</html>
